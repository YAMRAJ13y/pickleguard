name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q
      - name: Scan a benign model (exit 0)
        run: pickleguard scan fixtures/benign.pkl
      - name: Verify a malicious model is flagged (non-zero exit)
        run: |
          if pickleguard scan fixtures/malicious_os_system.pkl; then
            echo "ERROR: malicious pickle was not flagged" && exit 1
          else
            echo "OK: malicious pickle correctly flagged"
          fi
